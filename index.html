<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>破曉計畫｜部隊戰術詢問與法規演練系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
:root{--bg:#0a0c0f;--sur:#111418;--bor:#252a32;--gold:#c8a96e;--gold2:#e8c98e;--text:#e8eaf0;--muted:#8892a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
.mono{font-family:'JetBrains Mono',monospace;}
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bor);padding:0 20px;}
.tab-btn{padding:15px 25px;cursor:pointer;border:none;background:none;color:var(--muted);font-weight:700;font-size:14px;transition:0.3s;position:relative;}
.tab-btn.active{color:var(--gold2);}
.tab-btn.active::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:2px;background:var(--gold);}
.content-section{display:none;max-width:1000px;margin:30px auto;padding:0 20px;}
.content-section.active{display:block;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:25px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
textarea{width:100%;height:220px;background:#050607;color:#fff;border:1px solid var(--bor);padding:18px;border-radius:4px;font-size:15px;line-height:1.7;margin-bottom:15px;outline:none;}
.btn-gen{background:#1a1d23;color:var(--gold2);border:1px solid var(--gold);padding:12px;cursor:pointer;width:100%;border-radius:4px;font-weight:700;margin-bottom:20px;letter-spacing:1px;}
.btn-gen:hover{background:var(--gold);color:#000;}
.btn-main{background:linear-gradient(135deg,#b8944a,#c8a96e);color:#000;border:none;padding:18px;font-weight:900;cursor:pointer;width:100%;border-radius:4px;font-size:16px;letter-spacing:1px;}
.tag{background:rgba(200,169,110,0.1);color:var(--gold2);padding:3px 8px;font-size:10px;font-weight:700;border-radius:2px;margin-bottom:10px;display:inline-block;border:1px solid rgba(200,169,110,0.3);}
</style>
</head>
<body>

<nav style="background:#000; padding:15px 25px; border-bottom:1px solid var(--bor); display:flex; justify-content:space-between; align-items:center;">
    <h1 style="font-size:18px; color:var(--gold); font-weight:900;">破曉計畫：部隊反情報與行政演練系統</h1>
    <span class="mono" style="font-size:10px; color:var(--muted);">OPERATION DAYBREAK V2.0</span>
</nav>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('daybreak')">第一階段：動態案例演練</button>
    <button class="tab-btn" onclick="showTab('ai-analysis')">第二階段：AI 分析門戶</button>
</div>

<section id="daybreak" class="content-section active">
    <div class="card">
        <span class="tag">DYNAMIC CASE GENERATOR</span>
        <button class="btn-gen" onclick="generateRandomCase()">➔ 隨機生成部隊違紀/國安模擬案例</button>
        
        <h3 style="color:var(--gold2); margin-bottom:10px; font-size:16px;">詢問紀錄書 (含行政與刑事事實)</h3>
        <textarea id="intelNote" placeholder="請點擊上方按鈕生成案例，或紀錄受詢者的回答矛盾點..."></textarea>
        
        <button class="btn-main" onclick="exportDoc()">產出報告紀錄 (Word)</button>
    </div>
</section>

<section id="ai-analysis" class="content-section">
    <div class="card" style="text-align:center; padding:50px 20px;">
        <h2 style="color:var(--gold2); margin-bottom:20px;">法律與行政處分深度分析</h2>
        <p style="color:var(--muted); margin-bottom:30px; line-height:1.8;">
            請複製第一階段的「詢問紀錄」，前往正式版系統。<br>AI 將依據《陸海空軍刑法》與《國防部組織法》進行法律與行政鑑定。
        </p>
        <a href="https://judicial-system-phi.vercel.app/" target="_blank" style="color:var(--gold2); text-decoration:none; border:1px solid var(--gold); padding:12px 24px; border-radius:4px; font-weight:700;">➔ 進入：智慧偵詢正式版系統</a>
    </div>
</section>

<script>
function generateRandomCase() {
    const roles = ["通信營上兵", "旅部人事次長室承辦人", "負責退撫基金之出納人員", "雷達站技術員", "門禁管制哨兵"];
    const actions = [
        "於機房私自操作非核定資通系統，導致目錄服務異常", 
        "因個人疏漏遲辦退撫基金撥補，致生國庫利息損失責任", 
        "於演習期間未依規定封存機密檔案並私自拍攝", 
        "擅自更改軍網權限設定並下載不明來源檔案", 
        "被發現於營外與身分不明人士密集餐敘且帳戶有不明匯款"
    ];
    const clues = [
        "現場發現其持有未經核准之加密儲存裝置。",
        "該員對關鍵時間點（2200-2400）之行蹤交代不清。",
        "監視紀錄顯示其曾規避哨所檢查點。",
        "其電腦紀錄中存有大量非權責範圍內之公務文件副本。",
        "經督察部門清查，其對退撫基金繳費流程供述與規定完全不符。"
    ];

    const r = roles[Math.floor(Math.random() * roles.length)];
    const a = actions[Math.floor(Math.random() * actions.length)];
    const c = clues[Math.floor(Math.random() * clues.length)];

    const finalCase = `【破曉計畫 - 模擬演習案例】\n\n受詢對象：${r}\n情節：${r}${a}。${c}\n\n詢問官指令：請詢問其動機，並分析其行為是否涉及行政過失（依據軍紀監察規定）或刑事洩密犯罪。`;
    document.getElementById('intelNote').value = finalCase;
}

function showTab(t) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(t).classList.add('active');
    event.currentTarget.classList.add('active');
}

async function exportDoc() {
    const { Document, Packer, Paragraph, HeadingLevel } = docx;
    const note = document.getElementById('intelNote').value;
    const doc = new Document({
        sections: [{
            children: [
                new Paragraph({ text: "破曉計畫：戰術詢問與法規清查紀錄", heading: HeadingLevel.HEADING_1 }),
                new Paragraph({ text: "\n" }),
                new Paragraph({ text: note })
            ]
        }]
    });
    Packer.toBlob(doc).then(blob => { saveAs(blob, "破曉計畫_訓練紀錄.docx"); });
}
</script>
</body>
</html>
